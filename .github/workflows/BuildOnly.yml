name: ModbusRx CI-BuildOnly

on:
  push:
    branches-ignore:
      - main

jobs:
  windows-latest:
    name: windows-latest
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
       fetch-depth: 0 # avoid shallow clone so nbgv can do its work.

    - name: Setup .NET (With cache)
      uses: actions/setup-dotnet@v5.4.0
      with:
        dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
        dotnet-quality: 'preview'
        cache: true
        cache-dependency-path: |
            **/Directory.Packages.props
            **/*.sln
            **/*.csproj
            **/global.json
            **/nuget.config

    - name: Add MSBuild to PATH
      uses: glennawatson/setup-msbuild@v1.0.3
      with:
        prerelease: true

    - name: NBGV
      id: nbgv
      uses: dotnet/nbgv@master
      with:
        setAllVars: true
    - run: echo 'SemVer2=${{ steps.nbgv.outputs.SemVer2 }}'

    - name: NuGet Restore
      run: dotnet restore ModbusRx.sln
      working-directory: src

    - name: Build
      run: msbuild /t:build,pack /nowarn:MSB4011 /maxcpucount /p:NoPackageAnalysis=true /verbosity:minimal /p:Configuration=Release ModbusRx.sln
      working-directory: src

    - name: Run Unit Tests and Generate Coverage
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $testProjects = @(
          'src\ModbusRx.UnitTests\ModbusRx.UnitTests.csproj',
          'src\ModbusRx.Generators.Tests\ModbusRx.Generators.Tests.csproj',
          'src\ModbusRx.IntegrationTests\ModbusRx.IntegrationTests.csproj'
        )

        foreach ($project in $testProjects) {
          $projectName = [System.IO.Path]::GetFileNameWithoutExtension($project)
          dotnet test $project `
            --configuration Release `
            --no-build `
            /p:CollectCoverage=true `
            /p:Include="ModbusRx*" `
            /p:CoverletOutputFormat=cobertura `
            /p:CoverletOutput="$env:GITHUB_WORKSPACE\TestResults\coverage\$projectName\"
        }

    - name: Upload Code Coverage
      uses: codecov/codecov-action@v7

    - name: Create NuGet Artifacts
      uses: actions/upload-artifact@master
      with:
        name: nuget
        path: '**/*.nupkg'
