name: ModbusRx CI-Build

on:
  push:
    branches:
      - main

jobs:
  windows-latest:
    name: windows-latest
    runs-on: windows-latest
    
    permissions: write-all
    environment:
      name: release
    steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
       fetch-depth: 0 # avoid shallow clone so nbgv can do its work.

    - name: Setup .NET (With cache)
      uses: actions/setup-dotnet@v5.4.0
      with:
        dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
            11.0.x
        dotnet-quality: 'preview'
        cache: true
        cache-dependency-path: |
            **/Directory.Packages.props
            **/*.sln
            **/*.csproj
            **/global.json
            **/nuget.config

    - name: NBGV
      id: nbgv
      uses: dotnet/nbgv@master
      with:
        setAllVars: true
    - run: echo 'SemVer2=${{ steps.nbgv.outputs.SemVer2 }}'

    - name: NuGet Restore
      run: dotnet restore ModbusRx.slnx
      working-directory: src

    - name: Build
      run: dotnet msbuild /t:build,pack /nowarn:MSB4011 /maxcpucount /p:NoPackageAnalysis=true /verbosity:minimal /p:Configuration=Release ModbusRx.slnx
      working-directory: src

    - name: Run Tests and Generate Coverage
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $testProjects = @(
          @{ Project = 'src\ModbusRx.UnitTests\ModbusRx.UnitTests.csproj'; Framework = 'net9.0' },
          @{ Project = 'src\ModbusRx.Generators.Tests\ModbusRx.Generators.Tests.csproj'; Framework = 'net9.0' },
          @{ Project = 'src\ModbusRx.IntegrationTests\ModbusRx.IntegrationTests.csproj'; Framework = 'net10.0' }
        )

        foreach ($testProject in $testProjects) {
          $projectName = [System.IO.Path]::GetFileNameWithoutExtension($testProject.Project)
          dotnet run `
            --project $testProject.Project `
            --configuration Release `
            --framework $testProject.Framework `
            --no-build `
            -- `
            --coverage `
            --coverage-output-format cobertura `
            --coverage-output "$env:GITHUB_WORKSPACE\TestResults\coverage\$projectName\coverage.cobertura.xml" `
            --results-directory "$env:GITHUB_WORKSPACE\TestResults\$projectName"
        }

    - name: Upload Code Coverage
      uses: codecov/codecov-action@v7

    - name: Create NuGet Artifacts
      uses: actions/upload-artifact@master
      with:
        name: nuget
        path: '**/*.nupkg'

    - name: NuGet Push
      env:
        NUGET_AUTH_TOKEN: ${{ secrets.NUGET_API_KEY }}
        SOURCE_URL: https://api.nuget.org/v3/index.json
      run: |
        dotnet nuget push -s ${{ env.SOURCE_URL }} -k ${{ env.NUGET_AUTH_TOKEN }} **/*.nupkg --skip-duplicate

    - name: Changelog
      uses: glennawatson/ChangeLog@v1
      id: changelog

    - name: Create Release
      uses: actions/create-release@v1.1.4
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
      with:
          tag_name: ${{ steps.nbgv.outputs.SemVer2 }}
          release_name: ${{ steps.nbgv.outputs.SemVer2 }}
          body: |
            ${{ steps.changelog.outputs.commitLog }}
